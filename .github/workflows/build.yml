name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: macos-14
            platform: mac
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── Platform dependencies ───────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev libfreetype-dev \
            libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev libxext-dev \
            libcurl4-openssl-dev libwebkit2gtk-4.1-dev \
            pkg-config cmake ffmpeg fluidsynth

      - name: Install macOS dependencies
        if: matrix.platform == 'mac'
        run: brew install cmake pkg-config ffmpeg fluid-synth

      - name: Install Windows dependencies
        if: matrix.platform == 'win'
        run: choco install cmake ffmpeg --installargs 'ADD_CMAKE_TO_PATH=System'

      # ── Build native addon ──────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      - name: Configure audio engine
        run: npx cmake-js configure --runtime electron --runtime-version $(node -e "console.log(require('./node_modules/electron/package.json').version)") --arch ${{ matrix.arch }} --CDCMAKE_BUILD_TYPE=Release
        shell: bash

      - name: Build audio engine
        run: cmake --build build --config Release -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 2)
        shell: bash

      - name: Build TypeScript
        run: npm run build:ts

      # ── Bundle Slopsmith server + plugins ───────────────────────────────
      - name: Clone Slopsmith and plugins
        shell: bash
        run: |
          SLOPSMITH_TMP="${RUNNER_TEMP}/slopsmith"
          git clone --depth 1 https://github.com/byrongamatos/slopsmith.git "$SLOPSMITH_TMP"

          # Remove broken symlinks from plugins dir, keep __init__.py and any real dirs
          find "$SLOPSMITH_TMP/plugins" -maxdepth 1 -type l -delete 2>/dev/null || true

          cd "$SLOPSMITH_TMP/plugins"
          for repo in 3dhighway backingtrack cf fretboard metronome midi notedetect practice profileimport sectionmap setlist tabimport tabview tones ug; do
            git clone --depth 1 "https://github.com/byrongamatos/slopsmith-plugin-${repo}.git" "${repo}" 2>/dev/null || echo "  skipped ${repo}"
          done
          echo "Plugins cloned: $(ls -d */ 2>/dev/null | wc -l)"

      - name: Bundle Slopsmith into resources
        shell: bash
        run: |
          SLOPSMITH_TMP="${RUNNER_TEMP}/slopsmith"
          mkdir -p resources/slopsmith/{static,lib,plugins}

          # Server + lib
          cp "$SLOPSMITH_TMP/server.py" resources/slopsmith/
          cp -r "$SLOPSMITH_TMP/lib/"* resources/slopsmith/lib/
          rm -rf resources/slopsmith/lib/__pycache__

          # Static assets
          for f in index.html app.js highway.js style.css; do
            [ -f "$SLOPSMITH_TMP/static/$f" ] && cp "$SLOPSMITH_TMP/static/$f" resources/slopsmith/static/
          done

          # Plugins
          [ -f "$SLOPSMITH_TMP/plugins/__init__.py" ] && cp "$SLOPSMITH_TMP/plugins/__init__.py" resources/slopsmith/plugins/
          for d in "$SLOPSMITH_TMP/plugins/"*/; do
            name=$(basename "$d")
            [ "$name" = "__pycache__" ] && continue
            mkdir -p "resources/slopsmith/plugins/$name"
            find "$d" -maxdepth 1 \( -name "*.py" -o -name "*.js" -o -name "*.html" -o -name "*.json" -o -name "*.css" \) -exec cp {} "resources/slopsmith/plugins/$name/" \;
          done

          # Desktop-specific plugins (audio_engine, plugin_manager)
          for dp in src/renderer src/renderer/plugin-manager; do
            if [ -f "$dp/plugin.json" ]; then
              pname=$(python3 -c "import json; print(json.load(open('$dp/plugin.json'))['id'])")
              mkdir -p "resources/slopsmith/plugins/$pname"
              cp "$dp"/*.html "$dp"/*.js "$dp"/plugin.json "resources/slopsmith/plugins/$pname/" 2>/dev/null || true
            fi
          done

      - name: Bundle standalone Python
        shell: bash
        run: |
          mkdir -p resources/python

          if [ "${{ matrix.platform }}" = "win" ]; then
            # Windows: download embeddable Python
            curl -sL "https://www.python.org/ftp/python/3.12.10/python-3.12.10-embed-amd64.zip" -o /tmp/python-embed.zip
            unzip -q /tmp/python-embed.zip -d resources/python/
            # Enable pip in embedded Python by uncommenting import site
            sed -i 's/#import site/import site/' resources/python/python312._pth
            # Add Lib/site-packages to the pth file so packages are found
            echo "Lib/site-packages" >> resources/python/python312._pth
            # Install pip
            curl -sL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py
            resources/python/python.exe /tmp/get-pip.py --quiet --no-cache-dir 2>&1 | tail -3
            # Install setuptools (needed to build some packages) then app packages
            resources/python/python.exe -m pip install --quiet --no-cache-dir setuptools wheel 2>&1 | tail -3
            resources/python/python.exe -m pip install --quiet --no-cache-dir \
              fastapi "uvicorn[standard]" websockets pycryptodome pyguitarpro \
              Pillow midiutil python-multipart requests 2>&1 | tail -5
            # Remove the ._pth file so PYTHONPATH env var works at runtime
            rm -f resources/python/python312._pth

          elif [ "${{ matrix.platform }}" = "mac" ]; then
            # macOS: use the setup-python installation and copy it
            PYTHON_PREFIX=$(python3 -c "import sys; print(sys.prefix)")
            cp -R "$PYTHON_PREFIX" resources/python/runtime
            # Install packages into the runtime
            resources/python/runtime/bin/python3 -m pip install --quiet --no-cache-dir \
              fastapi "uvicorn[standard]" websockets pycryptodome pyguitarpro \
              Pillow midiutil python-multipart requests 2>&1 | tail -5

          else
            # Linux: copy full Python installation for a relocatable runtime
            PYTHON_PREFIX=$(python3 -c "import sys; print(sys.prefix)")
            mkdir -p resources/python/runtime/bin
            # Copy binary
            cp "$PYTHON_PREFIX/bin/python3.12" resources/python/runtime/bin/python3
            chmod +x resources/python/runtime/bin/python3
            # Copy stdlib
            cp -r "$PYTHON_PREFIX/lib" resources/python/runtime/
            # Copy libpython shared library
            PYTHON_LIBDIR=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")
            cp "$PYTHON_LIBDIR"/libpython3.12*.so* resources/python/runtime/lib/ 2>/dev/null || true
            # Install packages into the runtime
            LD_LIBRARY_PATH="resources/python/runtime/lib:$LD_LIBRARY_PATH" \
            resources/python/runtime/bin/python3 -m pip install --quiet --no-cache-dir \
              fastapi "uvicorn[standard]" websockets pycryptodome pyguitarpro \
              Pillow midiutil python-multipart requests 2>&1 | tail -5
          fi

      - name: Build and bundle RsCli
        shell: bash
        run: |
          git clone --depth 1 https://github.com/byrongamatos/Rocksmith2014.NET.git /tmp/rs2014net
          cd /tmp/rs2014net/tools/RsCli
          if [ "${{ matrix.platform }}" = "win" ]; then
            RID="win-x64"
          elif [ "${{ matrix.platform }}" = "mac" ]; then
            RID="osx-arm64"
          else
            RID="linux-x64"
          fi
          dotnet publish -c Release -r $RID --self-contained -o /tmp/rscli-out 2>&1 | tail -3
          mkdir -p $GITHUB_WORKSPACE/resources/bin/rscli
          cp -r /tmp/rscli-out/* $GITHUB_WORKSPACE/resources/bin/rscli/
          echo "RsCli bundled for $RID ($(du -sh $GITHUB_WORKSPACE/resources/bin/rscli/ | cut -f1))"

      - name: Bundle system binaries (Linux/macOS)
        run: |
          mkdir -p resources/bin
          if command -v ffmpeg &>/dev/null; then
            cp $(which ffmpeg) resources/bin/ 2>/dev/null || true
          fi
          if command -v fluidsynth &>/dev/null; then
            cp $(which fluidsynth) resources/bin/ 2>/dev/null || true
          fi
          # vgmstream-cli isn't available in Ubuntu apt or (reliably) Homebrew,
          # so download the official release binary for both platforms. This
          # closes byrongamatos/slopsmith-desktop#9 (Linux silent audio) and the
          # macOS equivalent at the same time.
          if [ "${{ matrix.platform }}" = "linux" ]; then
            VGM_ASSET="vgmstream-linux-cli.zip"
          else
            VGM_ASSET="vgmstream-mac-cli.zip"
          fi
          curl -sL "https://github.com/vgmstream/vgmstream/releases/latest/download/${VGM_ASSET}" -o /tmp/vgmstream.zip
          unzip -q /tmp/vgmstream.zip -d /tmp/vgmstream
          # Layouts vary slightly between platforms; find the binary and copy it.
          VGM_BIN=$(find /tmp/vgmstream -maxdepth 2 -name 'vgmstream-cli' -type f | head -1)
          if [ -n "$VGM_BIN" ]; then
            cp "$VGM_BIN" resources/bin/vgmstream-cli
            chmod +x resources/bin/vgmstream-cli
          fi
          echo "Bundled binaries:"
          ls -lh resources/bin/ | awk 'NR>1{printf "  %s %s\n", $5, $9}'
        shell: bash
        if: matrix.platform != 'win'

      - name: Bundle system binaries (Windows)
        shell: bash
        run: |
          mkdir -p resources/bin

          # ffmpeg static build
          curl -sL "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o /tmp/ffmpeg.zip
          unzip -q /tmp/ffmpeg.zip -d /tmp/ffmpeg
          cp /tmp/ffmpeg/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe resources/bin/ 2>/dev/null || true

          # vgmstream-cli
          curl -sL "https://github.com/vgmstream/vgmstream/releases/latest/download/vgmstream-win64.zip" -o /tmp/vgmstream.zip
          unzip -q /tmp/vgmstream.zip -d /tmp/vgmstream
          cp /tmp/vgmstream/vgmstream-cli.exe resources/bin/ 2>/dev/null || true
          cp /tmp/vgmstream/*.dll resources/bin/ 2>/dev/null || true

          # fluidsynth — official Windows build; includes fluidsynth.exe + DLLs
          # under bin/. Pinned to v2.5.4; bump deliberately when newer versions
          # are verified to still work against bundled Python + soundfont.
          curl -sL "https://github.com/FluidSynth/fluidsynth/releases/download/v2.5.4/fluidsynth-v2.5.4-win10-x64-cpp11.zip" -o /tmp/fluidsynth.zip
          unzip -q /tmp/fluidsynth.zip -d /tmp/fluidsynth
          cp /tmp/fluidsynth/bin/fluidsynth.exe resources/bin/ 2>/dev/null || true
          cp /tmp/fluidsynth/bin/*.dll resources/bin/ 2>/dev/null || true

          echo "Bundled binaries:"
          ls -lh resources/bin/ | awk 'NR>1{printf "  %s %s\n", $5, $9}'
        if: matrix.platform == 'win'

      - name: Bundle default soundfont (GeneralUser GS)
        shell: bash
        run: |
          mkdir -p resources/soundfonts
          # Pinned to commit SHA for reproducible builds — bump explicitly when
          # a new version of GeneralUser GS is verified. Source: S. Christian
          # Collins's repo, which explicitly hosts this for packaging use.
          # Licence: the GeneralUser GS license permits free redistribution in
          # FOSS apps; see resources/soundfonts/LICENSE.
          SF_SHA="298b552d2e9d1307e03e5c5c99d2c046aaed9ec3"
          curl -sL "https://raw.githubusercontent.com/mrbumpy409/GeneralUser-GS/${SF_SHA}/GeneralUser-GS.sf2" -o resources/soundfonts/GeneralUser-GS.sf2
          echo "Soundfont: $(ls -lh resources/soundfonts/GeneralUser-GS.sf2 | awk '{print $5}')"

      # ── Package ─────────────────────────────────────────────────────────
      - name: Package
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slopsmith-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.zip
            release/*.exe
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
